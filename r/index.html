<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestigatePro Referral</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="../assets/logos/logo-03-icon-only.png">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0C142E 0%, #1A2744 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 3px solid rgba(118, 220, 236, 0.3);
            border-top: 3px solid #76DCEC;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #94a3b8;
            font-size: 0.875rem;
        }
    </style>
    <script>
        // Handle referral redirects
        // URL format: investigatepro.app/r/CODE
        (function() {
            var path = window.location.pathname;
            var code = path.replace(/^\/r\//, '').replace(/\/$/, '');
            
            if (code && code !== '') {
                // Redirect to signup with referral code
                var appUrl = 'https://investigatepro.72-62-211-212.sslip.io';
                window.location.href = appUrl + '/signup?ref=' + encodeURIComponent(code);
            } else {
                // No code, redirect to homepage
                window.location.href = '/';
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p class="message">Redirecting to InvestigatePro...</p>
    </div>
</body>
</html>
